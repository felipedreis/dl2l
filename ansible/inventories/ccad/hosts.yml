all:
  children:
    # CEFET-MG's CCAD HPC cluster (https://www.ccad.cefetmg.br/guia/) — SLURM,
    # GPU partition, shared NFS $HOME with per-user conda envs (miniforge3).
    # Separate from, and unrelated to, cluster.decom.cefetmg.br (inventories/cefet,
    # used only for CPU-only simulation jobs) — this is the actual training target.
    # A personal login, authenticated with institutional credentials (CPF as
    # username) — pass yours via `-e ccad_user=<cpf-no-punctuation>`.
    runner:
      hosts:
        login.ccad.cefetmg.br:
          ansible_user: "{{ ccad_user | default('CHANGE_ME_pass_-e_ccad_user') }}"
