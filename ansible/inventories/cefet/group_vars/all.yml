---
dl2l_env: cefet

# Repo root, resolved relative to this playbook's location on the control
# machine (the macbook running ansible-playbook) — NOT a path on the cluster.
repo_root: "{{ playbook_dir | dirname }}"

# CEFET's cluster.decom.cefetmg.br has NO docker — this is a bare-metal Akka
# cluster deployment (each role its own SLURM job), same shape as the legacy
# scripts/l2l_job.sh + scripts/deploy.sh they replace.
cefet_qos: part6h
cefet_partition: lsi-1
cefet_manager_node: compute-0-34   # legacy deploy.sh pinned the manager role here via `sbatch -w`

remote_work_dir: "l2l"   # relative to the login user's $HOME, matches copyToCluster.sh's ~/l2l

# Headless cluster — no UI port to publish (unlike inventories/local).
publish_ui: false

# ── THE OPEN SEAM ────────────────────────────────────────────────────────
# CEFET has no docker, so there is no `dl2l-db` container for
# scripts/dl2l_data/extract.py's --container flag to point at — extraction,
# backup, and upload all currently assume a docker-composed postgres that
# does not exist on this cluster. See
# ansible/roles/trial_runner_cefet/tasks/db_setup.yml and
# docs/plans/experiment-infra-ansible-refactor.md for what resolving this
# requires. Do not change this value until that follow-up task lands.
cefet_db_strategy: todo
