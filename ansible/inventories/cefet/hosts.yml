all:
  children:
    # CEFET's SLURM cluster (no docker — bare-metal Akka cluster deployment).
    # A personal login, unlike the Pi cluster's shared felipeduarte account —
    # pass your CEFET netid via `-e cefet_user=<netid>` (mirrors the `user`
    # positional arg the legacy scripts/copyToCluster.sh took).
    runner:
      hosts:
        cluster.decom.cefetmg.br:
          ansible_port: 2200
          ansible_user: "{{ cefet_user | default('CHANGE_ME_pass_-e_cefet_user') }}"
