all:
  children:
    # 192.168.1.200 is the SLURM controller/login node, the private docker
    # registry host, and where sbatch is submitted from.
    runner:
      hosts:
        192.168.1.200:
    workers:
      hosts:
        192.168.1.201:
        192.168.1.202:
        192.168.1.203:
    # Union of runner + workers, for provisioning tasks that touch every node.
    pi_nodes:
      children:
        runner:
        workers:
