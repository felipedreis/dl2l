---
# THE SEAM. Nothing in this repo or its git history indicates what
# Python/conda/PyTorch environment is available on CEFET — grepped the whole
# repo (source, configs, templates, docs) and the full git history of the
# deleted legacy CEFET scripts for `module load`/`conda`/`venv`; the only hit
# anywhere is `module load jdk8` (Java, unrelated). Resolving this — confirm
# via `module avail` on cluster.decom.cefetmg.br or ask CEFET admins what's
# installed, or provision a venv/conda env via ansible — is a follow-up task.
- name: CEFET Python/PyTorch strategy not yet implemented
  ansible.builtin.fail:
    msg: >-
      cefet_python_strategy is 'todo' — nothing in this repo or its history
      indicates what Python/conda/PyTorch setup exists on CEFET. Before
      training here you must: (1) confirm via `module avail` (logged into
      cluster.decom.cefetmg.br) or ask CEFET admins what Python/PyTorch
      environment is available, (2) set cefet_python_activate in
      ansible/inventories/cefet/group_vars/all.yml to whatever shell command
      activates it (e.g. "module load anaconda3 && conda activate dl2l-jepa"),
      (3) set cefet_python_strategy to something other than 'todo' once the
      above is done. This is intentionally left open for a follow-up task —
      see training/README.md and docs/plans/jepa-training-pipeline.md.
  when: cefet_python_strategy == 'todo'
