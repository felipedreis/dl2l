---
# CCAD requires the CEFET VPN, which drops the connection when idle — same
# constraint solved for training (roles/train_ccad). This role never blocks
# waiting for a job:
#
#   -e rescue=false (default) — submit.yml: sync config/scripts, render and
#     submit one SLURM array job per condition (plain sbatch, no --wait),
#     persist the {condition_key: job_id} mapping locally, report, return
#     immediately. Each array task (templates/run_trial.sh.j2) does
#     everything autonomously — start the 4 Singularity instances, run the
#     simulation, extract, and write its own DONE sentinel — no live
#     connection needed for any of it.
#
#   -e rescue=true — rescue.yml: for each condition, check whether every
#     trial's DONE sentinel exists; sync back whatever's done regardless;
#     only once EVERY condition's every trial is done does
#     experiment_finished become true (so run-experiment.yml's upload play
#     never fires on a partial dataset) — otherwise report per-condition
#     status and exit cleanly. Run again later, whenever back on the VPN.
- name: Submit experiment trials
  ansible.builtin.include_tasks: submit.yml
  when: not (rescue | default(false) | bool)

- name: Check on / collect previously submitted experiment trials
  ansible.builtin.include_tasks: rescue.yml
  when: rescue | default(false) | bool
