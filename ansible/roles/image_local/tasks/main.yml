---
# Builds the fat jar + docker image locally. Skipped entirely when the
# experiment spec says image.source: registry (image already exists
# somewhere and should just be pulled/used as-is) or when the caller passes
# -e build_image=false to reuse an image already built in a prior run.
- name: Package the fat jar (mvn package -DskipTests)
  ansible.builtin.command:
    argv: [mvn, package, -q, -DskipTests]
    chdir: "{{ repo_root }}"
  changed_when: true

- name: Build the docker image
  ansible.builtin.command:
    argv:
      - docker
      - build
      - -f
      - "{{ repo_root }}/docker/Dockerfile"
      - -t
      - "{{ dl2l_image }}"
      - "{{ repo_root }}"
  changed_when: true
