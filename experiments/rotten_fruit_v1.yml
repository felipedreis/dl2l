name: rotten_fruit_v1
trials: 5

conditions:
  - key: 1_baseline
    simulation: simulations/rotten_fruit_v1_1_baseline.conf
    label: Baseline
    color: "#9e9e9e"
  - key: 2_memory_only
    simulation: simulations/rotten_fruit_v1_2_memory_only.conf
    label: Memory
    color: "#5c85d6"
  - key: 3_memory_consolidation
    simulation: simulations/rotten_fruit_v1_3_memory_consolidation.conf
    label: Mem+Consol
    color: "#2b5eb8"
  - key: 4_jepa_rpe_only
    simulation: simulations/rotten_fruit_v1_4_jepa_rpe_only.conf
    label: JEPA
    color: "#b05ec4"
  - key: 5_jepa_rpe_consolidation
    simulation: simulations/rotten_fruit_v1_5_jepa_rpe_consolidation.conf
    label: JEPA+Consol
    color: "#7b2d8b"

image:
  source: build

data_dir: ml/data_rotten_fruit_v1

extract:
  format: parquet
  backup: true
  tables: all

upload:
  enabled: true
  repo: felipedreis/dl2l-experiments
  prefix: rotten_fruit_v1

analysis:
  module: rotten_fruit_v1
