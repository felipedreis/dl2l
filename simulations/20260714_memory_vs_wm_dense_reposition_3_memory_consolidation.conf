simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 60
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = true

  creatureSettings = [{
    quantity = 10
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }, {
    objectType = "GRAY_APPLE"
    quantity = 500
  }, {
    objectType = "CACTUS"
    quantity = 50
  }, {
    objectType = "ALOE"
    quantity = 100
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Dense-world + reposition variant of P7-local-3: Memory filter + Mapa-style consolidation during sleep. Reposition enabled, 10 creatures, 40 min cap.
  # Full subsystem stack (orexin, endocrine, neuromodulation, expectancy DISCRETE).
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = true
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, MEMORY, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
