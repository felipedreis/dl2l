simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 40
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  # Repositioning OFF so food scarcity can produce genuine deprivation and negative RPE.
  reposition = false

  creatureSettings = [{
    quantity = 3
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }]

  worldSize = {
    width = 800, height = 600
  }

  # Calibration run for issue-59: sleep pressure accumulation fix + orexin recalibration.
  # reposition=false lets food deplete so sleep pressure can build and negative RPE fires.
  # All neuromodulator/endocrine subsystems on; ActionTendency off so orexin is sole gating mechanism.
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = false
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, MEMORY, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = false
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
