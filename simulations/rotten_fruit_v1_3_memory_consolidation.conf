simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 120
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = false

  creatureSettings = [{
    quantity = 5
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }, {
    objectType = "ROTTEN_APPLE"
    quantity = 500
  }, {
    objectType = "CACTUS"
    quantity = 50
  }, {
    objectType = "ALOE"
    quantity = 100
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Rotten fruit experiment — condition 3: memory filter + sleep consolidation.
  # Novel world: ROTTEN_APPLE (caloricValue=-0.3) replaces GRAY_APPLE.
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = true
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, MEMORY, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
