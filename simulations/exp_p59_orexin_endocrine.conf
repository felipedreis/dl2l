simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 20
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = true

  creatureSettings = [{
    quantity = 3
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }]

  worldSize = {
    width = 800, height = 600
  }

  # Validation experiment for orexin/cortisol (post-#57).
  # ActionTendencyFilter is OFF so that SLEEP suppression during the active phase
  # must be produced by orexin alone — not the innate tendency prior.
  # Run long enough to see multiple circadian cycles (CIRCADIAN_PERIOD_TICKS = 200,
  # so at least 10 cycles = 2000+ ticks per creature).
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = false
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, MEMORY, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = false
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
