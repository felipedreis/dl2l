simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 120
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = true

  creatureSettings = [{
    quantity = 5
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 300
  }, {
    objectType = "GREEN_APPLE"
    quantity = 300
  }, {
    objectType = "GRAY_APPLE"
    quantity = 300
  }, {
    objectType = "CACTUS"
    quantity = 10
  }, {
    objectType = "ALOE"
    quantity = 50
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Data collection for JEPA v2 retrain (v3 config).
  # AFFORDANCE + RANDOM: neuromodulator state influences action selection,
  # creating meaningful h_t → action correlations for the emotion head to learn.
  # CACTUS reduced from 50 → 10 to avoid pain saturation (ht_pain was ~84% of max).
  # ALOE reduced from 100 → 50 accordingly.
  # Full subsystem stack matches the target deployment environment.
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = false
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
