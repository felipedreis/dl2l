simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 60
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = false

  creatureSettings = [{
    quantity = 10
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }, {
    objectType = "GRAY_APPLE"
    quantity = 500
  }, {
    objectType = "CACTUS"
    quantity = 50
  }, {
    objectType = "ALOE"
    quantity = 100
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Dense-world, scarce (no-reposition) variant — condition 3: adds sleep-time consolidation
  # (MemoryTraceConsolidator) on top of condition 2's MEMORY filter. See condition 1's comment
  # for the world/scarcity rationale.
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = true
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, MEMORY, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
