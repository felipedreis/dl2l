simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 60
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = false

  creatureSettings = [{
    quantity = 10
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }, {
    objectType = "GRAY_APPLE"
    quantity = 500
  }, {
    objectType = "CACTUS"
    quantity = 50
  }, {
    objectType = "ALOE"
    quantity = 100
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Dense-world, scarce (no-reposition) variant of 20260714_memory_vs_wm_dense_reposition's
  # condition 1 — same world/creature density (1200x900, 10 creatures, 500/500/500 apples,
  # 50 CACTUS, 100 ALOE), but reposition=false: eaten food does not respawn, so the world
  # depletes over the run, same as the original 20260709_memory_vs_wm_v1 experiment. Baseline —
  # no memory or world-model filter. Full subsystem stack (orexin, endocrine, neuromodulation,
  # expectancy DISCRETE).
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = false
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = DISCRETE
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
