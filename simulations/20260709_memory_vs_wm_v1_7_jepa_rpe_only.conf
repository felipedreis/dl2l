simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 60
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = false

  creatureSettings = [{
    quantity = 5
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }, {
    objectType = "GRAY_APPLE"
    quantity = 500
  }, {
    objectType = "CACTUS"
    quantity = 50
  }, {
    objectType = "ALOE"
    quantity = 100
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Condition 7: JEPA world-model filter + JEPA RPE baseline, no consolidation.
  # Mirrors condition 6 but with consolidationEnabled=false to isolate the effect
  # of the JEPA RPE expectancy baseline from sleep-based adapter fine-tuning.
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = false
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, WORLD_MODEL, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = JEPA
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
