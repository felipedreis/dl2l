simulation {
  holders = 1
  noUI = false
  maxRuntimeMinutes = 60
  positionFactory = "br.cefetmg.lsi.l2l.world.RandomPositionFactory"
  reposition = false

  creatureSettings = [{
    quantity = 5
  }]

  worldObjectSettings = [{
    objectType = "RED_APPLE"
    quantity = 500
  }, {
    objectType = "GREEN_APPLE"
    quantity = 500
  }, {
    objectType = "GRAY_APPLE"
    quantity = 500
  }, {
    objectType = "CACTUS"
    quantity = 50
  }, {
    objectType = "ALOE"
    quantity = 100
  }]

  worldSize = {
    width = 1200, height = 900
  }

  # Condition 6: JEPA world-model filter + JEPA RPE baseline + JEPA adapter consolidation.
  # expectancyMode=JEPA wires JepaExpectancyPredictor so dopamine fires on world-model
  # prediction error rather than historical running-mean error. The adapter fine-tunes during
  # sleep on RPE-weighted engrams, closing the prospective/retrospective loop.
  learningSettings {
    circadianEnabled       = true
    consolidationEnabled   = true
    enabledFilters         = [TARGET_DISTANCE, AFFORDANCE, WORLD_MODEL, RANDOM]
    expectancyEnabled      = true
    expectancyMode         = JEPA
    neuromodulationEnabled = true
    actionTendencyEnabled  = true
    orexinEnabled          = true
    endocrineEnabled       = true
  }
}
