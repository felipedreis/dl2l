object-dispatcher {
  type = Dispatcher
  executor = "fork-join-executor"

  fork-join-executor {
    parallelism-min = 2
    parallelism-factor = 2.0
    parallelism-max = 20
  }
  throughput = 10
}

bd-dispatcher {
  type = PinnedDispatcher
  mailbox-type = "br.cefetmg.lsi.l2l.common.ComponentMailbox"
  executor = "thread-pool-executor"
}

wm-dispatcher {
  type = PinnedDispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = 1
  }
}

collision-dispatcher {
  mailbox-type = "br.cefetmg.lsi.l2l.cluster.CollisionDetectorPriorityMailbox"
}

component-dispatcher {
  mailbox-type = "br.cefetmg.lsi.l2l.common.ComponentMailbox"
}

akka.actor.deployment {
  "/holder/object-*" {
    dispatcher = object-dispatcher
  }
}


akka {
  # CONFIRMED LIVE: DEBUG (copied verbatim from docker-config.conf) floods
  # ~/.singularity/instances/logs/*/*/dl2l-*.{out,err} with akka gossip/
  # heartbeat/serialization-warning noise — one such log accumulated 240MB+
  # across a single session. Unlike local/Pi docker logs (local disk), these
  # are on CCAD's NFS-mounted $HOME, so every DEBUG line written there is
  # network I/O. INFO keeps SimulationManager's own completion-detection
  # messages (run_trial.sh.j2 greps manager's log for "Maximum runtime
  # reached"/"All creatures dead") working — do not go below INFO here.
  loglevel = "INFO"

  actor {
    #provider = "akka.cluster.ClusterActorRefProvider"
    provider = "cluster"
    guardian-supervisor-strategy = "akka.actor.StoppingSupervisorStrategy"
  }
  remote {
    artery {
      enabled = false  # Since you're using classic remoting
    }
    netty.tcp {
      hostname = ${HOST}
      port = ${PORT}
      bind-hostname = ${HOST} #0.0.0.0 # Allow external connections
      bind-port = ${PORT}
    }
    log-remote-lifecycle-events = on
    use-passive-connections = off
  }

  cluster {
    # CCAD's Singularity instances share the allocated node's network
    # namespace (no per-container hostnames/DNS like Docker's bridge
    # network), so every role uses HOST=localhost with a distinct PORT
    # instead of a container-name seed address.
    #
    # CONFIRMED LIVE (2026-07-16): this used to hardcode :2551 for
    # manager's port, safe only when every trial on the cluster used the
    # same fixed ports — broke once concurrent trials landed on the same
    # node (short_qos's CPU grant allows far more parallelism than
    # originally assumed: up to 9 trials observed live on one 56-CPU
    # node) and needed distinct ports to avoid colliding. ${SEED_PORT} is
    # now set per-trial by run_trial.sh.j2 (always equal to that trial's
    # own manager port) and passed to manager/detector/holder alike, so
    # detector/holder find THIS trial's manager specifically, not
    # whichever one last happened to bind 2551.
    seed-nodes = [
      "akka.tcp://l2l@localhost:"${SEED_PORT},
    ]
    min-nr-of-members = 2
  }
  version = 2.5.32
}
