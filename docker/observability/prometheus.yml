# Scraped by the long-lived Prometheus/Grafana stack (docker-compose-observability.yml),
# which stays up across experiment trials. Targets are static host ports because every
# experiment compose file (docker-compose-<exp>-*.yml) publishes the same ports regardless
# of which trial/condition is currently running (see run_exp_20260709.sh).
#
# host.docker.internal resolves to the Docker host from inside a container — works
# natively on Docker Desktop for Mac/Windows.
scrape_configs:
  - job_name: dl2l-manager
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: dl2l-holder
    scrape_interval: 5s
    static_configs:
      - targets: ["host.docker.internal:9092"]
